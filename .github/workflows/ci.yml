name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint con ruff
        run: ruff check . && ruff format --check .

      - name: Ejecutar tests
        run: pytest tests/ -v --cov=sward_shared --cov-report=term-missing
